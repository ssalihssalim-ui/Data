<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMarket POS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">MiniMarket</div>
    <div class="menu-btn" id="menu-btn">☰</div>
</nav>

<!-- Menu overlay -->
<div class="menu-overlay" id="menu">
    <div class="close-btn" id="close-btn">✕</div>
    <ul class="menu-items">
        <li><a href="#" id="openCategory">CATEGORIE</a></li>
        <li><a href="#">PRODUCTS</a></li>
        <li><a href="#">CLIENT</a></li>
        <li><a href="#">SUPPLIERS</a></li>
    </ul>
</div>

<!-- Main content -->
<div class="content">
    <h1>DATA</h1>
    <p>Here you can find categories / products / clients / suppliers / statistics</p>
</div>

<!-- ================= CATEGORY MODAL ================= -->
<div class="category-modal" id="categoryModal" style="display:none;">
    <div class="category-box">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Add Category</h2>
            <span id="closeCategory" style="cursor:pointer; color:red; font-weight:bold; font-size:20px;">✖</span>
        </div>

        <input 
            type="text" 
            id="categoryName" 
            placeholder="Enter category name"
            style="width:100%; padding:8px; margin-top:10px;"
        >

        <button 
            id="saveCategory"
            style="width:100%; padding:8px; margin-top:10px; background:green; color:white; border:none; cursor:pointer;"
        >
            Save
        </button>

        <h3 style="margin-top:20px;">Categories List</h3>
        <ul id="categoryList" style="list-style:none; padding:0;"></ul>

    </div>
</div>
<!-- =================================================== -->

<script>
/* ================= MENU TOGGLE ================= */
const menuBtn = document.getElementById("menu-btn");
const menu = document.getElementById("menu");
const closeMenuBtn = document.getElementById("close-btn");

menuBtn.addEventListener("click", () => {
    menu.style.display = "block";
});

closeMenuBtn.addEventListener("click", () => {
    menu.style.display = "none";
});

/* ================= CATEGORY MODAL ================= */
const openBtn = document.getElementById("openCategory");
const modal = document.getElementById("categoryModal");
const closeBtn = document.getElementById("closeCategory");
const saveBtn = document.getElementById("saveCategory");
const categoryInput = document.getElementById("categoryName");
const categoryList = document.getElementById("categoryList");

// Open modal
openBtn.addEventListener("click", () => {
    modal.style.display = "flex";
    loadCategories();
});

// Close modal
closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
});

// Save category
saveBtn.addEventListener("click", () => {
    const name = categoryInput.value.trim();
    if (!name) {
        alert("Enter category name");
        return;
    }

    let categories = JSON.parse(localStorage.getItem("categories")) || [];

    const newCategory = {
        id: Date.now(),
        category_name: name,
        created_at: new Date().toISOString()
    };

    categories.push(newCategory);
    localStorage.setItem("categories", JSON.stringify(categories));

    categoryInput.value = "";
    loadCategories();
});

// Load categories
function loadCategories() {
    categoryList.innerHTML = "";
    let categories = JSON.parse(localStorage.getItem("categories")) || [];

    categories.forEach(cat => {
        const li = document.createElement("li");
        li.style.background = "#f2f2f2";
        li.style.padding = "6px";
        li.style.marginTop = "5px";
        li.style.borderRadius = "4px";

        li.innerHTML = `
            <strong>${cat.category_name}</strong><br>
            ID: ${cat.id}<br>
            Date: ${new Date(cat.created_at).toLocaleString()}
        `;

        categoryList.appendChild(li);
    });
}
</script>

</body>
</html>
